app_name: Resume Builder
version: 0.1.0
active_provider: claude_cli
claude_cli:
  enabled: true
  mode: print
  timeout_seconds: 600
  retry_on_failure: true
  max_retries: 2
  add_dir_flag: --add-dir
anthropic_api:
  enabled: false
  api_key: null
  default_model: claude-sonnet-4-20250514
  max_tokens: 8000
  temperature: 0.0
openai:
  enabled: false
  api_key: null
  default_model: gpt-4o
  max_tokens: 8000
  temperature: 0.0
perplexity:
  enabled: false
  api_key: null
  default_model: llama-3.1-sonar-large-128k-online
  max_tokens: 8000
inputs:
  job_description: data/job_description_temp.md
  resume_template: data/resume_template/template.tex
  experience:
    current: data/experience/current.md
    previous: data/experience/previous.md
  projects: data/projects/projects.md
output:
  base_dir: data/resume_output
  folder_format: '{company}_{role}'
  pdf_name: Charuthri_Abburi_Resume.pdf
  artifacts:
    plan: resume_plan.md
    feedback: review_feedback.md
    latex: Charuthri_Abburi_Resume.tex
latex:
  compiler: pdflatex
  compile_twice: true
  clean_aux_files: true
  aux_extensions:
  - .aux
  - .log
  - .out
  - .toc
  - .fls
  - .fdb_latexmk
stages:
  planner:
    name: 'Stage 1: Planner'
    description: Analyzes JD and creates rewrite plan
    output_file: resume_plan.md
  reviewer:
    name: 'Stage 2: Reviewer'
    description: Validates plan and provides feedback
    output_file: review_feedback.md
  executor:
    name: 'Stage 3: Executor'
    description: Generates final LaTeX from plan + feedback
    output_file: resume.tex
protected_content:
  name: Charuthri Abburi
  email: charuthriabburi05@gmail.com
  phone: 716-609-3740
  linkedin: linkedin.com/in/charuthri-abburi
  github: https://github.com/charuthri05/jobsniper
  education_dates:
    university_at_buffal: '2024'
    jawaharlal_nehru_tec: '2022'
  employment_dates:
    linq: 2025-04 -- present
    opentext: 2021-06 -- 2021-07
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: null
